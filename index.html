<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bar Povero Diavolo - Menu</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Montserrat:wght@300;400;700&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfaf7;
            --text: #2b1d1a;
            --accent: #a64d2d;
            --header-bg: #fdfaf7;
            --nav-bg: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding-bottom: 110px;
            scroll-behavior: smooth;
        }

        header {
            text-align: center;
            padding: 20px 0;
            background: var(--header-bg);
            border-bottom: 1px solid rgba(166, 77, 45, 0.1);
        }

        .logo-text {
            font-family: 'Special Elite', cursive;
            font-size: 22px;
            color: var(--accent);
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        .lang-switcher { display: flex; justify-content: center; gap: 25px; }
        .lang-btn { font-size: 22px; cursor: pointer; opacity: 0.4; transition: 0.3s; }
        .lang-btn.active { opacity: 1; transform: scale(1.2); }

        .container { padding: 15px; max-width: 600px; margin: auto; }

        .category-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 42px;
            color: var(--accent);
            text-align: center;
            margin: 40px 0 10px;
            font-weight: 600;
            letter-spacing: -1px;
            text-transform: capitalize;
            animation: fadeIn 0.8s ease;
        }

        /* --- STILE LOADER --- */
        #loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px 0;
            color: var(--accent);
            font-size: 10px;
            letter-spacing: 2px;
            font-weight: 700;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 2px solid rgba(166, 77, 45, 0.1);
            border-top: 2px solid var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* FILTRI E MENU */
        .sub-filters { display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; margin-bottom: 30px; animation: fadeIn 0.5s ease; }
        .sub-filter-btn {
            background: transparent; border: 1px solid rgba(166, 77, 45, 0.2);
            color: var(--text); padding: 6px 14px; border-radius: 15px;
            font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
            text-decoration: none;
        }

        .subcat-header {
            font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
            color: #ccc; margin: 45px 0 15px; border-bottom: 1px solid rgba(166, 77, 45, 0.08);
            padding-bottom: 5px; scroll-margin-top: 100px;
        }

        .menu-item {
            display: flex; justify-content: space-between; align-items: flex-start;
            padding: 15px 0; border-bottom: 1px solid rgba(166, 77, 45, 0.05);
            animation: fadeIn 0.5s ease;
        }

        .item-details { flex: 1; padding-right: 20px; }
        .item-name { font-weight: 700; font-size: 16px; margin-bottom: 5px; }
        .item-desc { font-size: 13px; color: #777; font-weight: 300; line-height: 1.4; margin-bottom: 5px; }
        .item-price { font-weight: 700; color: var(--accent); font-size: 16px; }
        
        .item-meta { font-size: 10px; color: #aaa; display: flex; flex-wrap: wrap; gap: 12px; text-transform: uppercase; }
        .meta-label { font-weight: 700; color: #888; }

        /* NAVBAR */
        nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--nav-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            display: flex; overflow-x: auto; padding: 18px 10px; gap: 10px;
            border-top: 1px solid rgba(166, 77, 45, 0.1); z-index: 1000; scrollbar-width: none;
        }
        nav::-webkit-scrollbar { display: none; }
        nav button {
            background: none; border: 1px solid rgba(166, 77, 45, 0.15);
            color: var(--text); padding: 10px 20px; border-radius: 25px;
            white-space: nowrap; font-family: 'Montserrat', sans-serif;
            font-size: 12px; font-weight: 400; cursor: pointer; transition: 0.3s;
        }
        nav button.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 4px 12px rgba(166, 77, 45, 0.25); }
    </style>
</head>
<body>

<header>
    <div class="logo-text">BAR POVERO DIAVOLO</div>
    <div class="lang-switcher">
        <span class="lang-btn active" onclick="changeLang('IT')" id="l-IT">🇮🇹</span>
        <span class="lang-btn" onclick="changeLang('EN')" id="l-EN">🇬🇧</span>
        <span class="lang-btn" onclick="changeLang('DE')" id="l-DE">🇩🇪</span>
    </div>
</header>

<div class="container">
    <div id="loader">
        <div class="spinner"></div>
        <div id="loader-text">CARICAMENTO</div>
    </div>
    <div id="menu-content"></div>
</div>

<nav id="tabs"></nav>

<script>
    const GIDS = {
        'Caffetteria': '0',
        'Bevande': '1449858284', 
        'Aperitivi': '2008785960',
        'Birre_e_Vino': '1805107999',
        'Cocktail': '2080510881',
        'Cucina': '1144090031'
    };

    const uiTexts = {
        'IT': { loader: "CARICAMENTO", info: "INFO", allergens: "ALLERGENI" },
        'EN': { loader: "LOADING", info: "INFO", allergens: "ALLERGENS" },
        'DE': { loader: "LADEN", info: "INFO", allergens: "ALLERGENE" }
    };

    const catNames = {
        'Caffetteria': { IT: 'Caffetteria', EN: 'Coffee Shop', DE: 'Kaffeehaus' },
        'Bevande': { IT: 'Bevande', EN: 'Beverages', DE: 'Getränke' },
        'Aperitivi': { IT: 'Aperitivi', EN: 'Appetizers', DE: 'Aperitifs' },
        'Birre_e_Vino': { IT: 'Vini e Birre', EN: 'Beer & Wine', DE: 'Bier & Wein' },
        'Cocktail': { IT: 'Cocktail', EN: 'Cocktails', DE: 'Cocktails' },
        'Cucina': { IT: 'Cucina', EN: 'Kitchen', DE: 'Küche' }
    };
    
    const SHEET_BASE_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSVBgF1mKBTxorPi079dl_2ISJ9RHoZDgM4HXEUfF_mcAKrfI0W0jPP3AdhVF5f0g7EB5xfzTgoEiLQ/pub?output=csv';
    let menuData = {};
    let currentLang = 'IT';
    let currentCat = 'Caffetteria';

    function isValid(val) { return val && val.trim() !== '' && val.trim() !== '-'; }

    async function init() {
        document.getElementById('loader-text').innerText = uiTexts[currentLang].loader;
        for (let cat of Object.keys(GIDS)) {
            try {
                const response = await fetch(`${SHEET_BASE_URL}&gid=${GIDS[cat]}`);
                const csvString = await response.text();
                const results = Papa.parse(csvString, { header: true, skipEmptyLines: true });
                menuData[cat] = results.data.filter(row => {
                    const keys = Object.keys(row);
                    return row[keys[9]] && row[keys[9]].trim().toUpperCase() === 'SI';
                });
            } catch (error) { console.error(error); }
        }
        document.getElementById('loader').style.display = 'none';
        renderTabs();
        renderMenu('Caffetteria');
    }

    function renderTabs() {
        const tabsContainer = document.getElementById('tabs');
        tabsContainer.innerHTML = Object.keys(GIDS).map(cat => `
            <button onclick="renderMenu('${cat}')" id="btn-${cat}">
                ${catNames[cat][currentLang]}
            </button>
        `).join('');
    }

    function renderMenu(cat) {
        currentCat = cat;
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        const activeBtn = document.getElementById(`btn-${cat}`);
        if(activeBtn) {
            activeBtn.classList.add('active');
            activeBtn.scrollIntoView({ behavior: 'smooth', inline: 'center' });
        }

        const content = document.getElementById('menu-content');
        const items = menuData[cat] || [];
        const grouped = items.reduce((acc, item) => {
            const keys = Object.keys(item);
            const sc = isValid(item[keys[0]]) && item[keys[0]].toLowerCase() !== 'menu' ? item[keys[0]] : "Main"; 
            if (!acc[sc]) acc[sc] = [];
            acc[sc].push(item);
            return acc;
        }, {});

        let html = `<h2 class="category-title">${catNames[cat][currentLang]}</h2>`;
        const subcats = Object.keys(grouped);
        const validSubcats = subcats.filter(sc => sc !== "Main");

        if(validSubcats.length > 0) {
            html += `<div class="sub-filters">`;
            validSubcats.forEach(sc => { html += `<a href="#sc-${sc.replace(/\s/g, '')}" class="sub-filter-btn">${sc}</a>`; });
            html += `</div>`;
        }

        subcats.forEach(sc => {
            if (sc !== "Main") { html += `<div id="sc-${sc.replace(/\s/g, '')}" class="subcat-header">${sc}</div>`; }
            grouped[sc].forEach(item => {
                const keys = Object.keys(item);
                const name = item[keys[1 + (currentLang === 'EN' ? 1 : (currentLang === 'DE' ? 2 : 0))]] || item[keys[1]];
                const desc = item[keys[4 + (currentLang === 'EN' ? 1 : (currentLang === 'DE' ? 2 : 0))]] || item[keys[4]];
                const price = item[keys[7]];
                const allergens = item[keys[8]];
                const variants = item[keys[10]];

                html += `
                    <div class="menu-item">
                        <div class="item-details">
                            <div class="item-name">${name}</div>
                            ${isValid(desc) ? `<div class="item-desc">${desc}</div>` : ''}
                            <div class="item-meta">
                                ${isValid(variants) ? `<span><span class="meta-label">${uiTexts[currentLang].info}:</span> ${variants}</span>` : ''}
                                ${isValid(allergens) ? `<span><span class="meta-label">${uiTexts[currentLang].allergens}:</span> ${allergens}</span>` : ''}
                            </div>
                        </div>
                        <div class="item-price">€ ${price}</div>
                    </div>
                `;
            });
        });
        content.innerHTML = html;
        window.scrollTo(0, 0);
    }

    function changeLang(lang) {
        currentLang = lang;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`l-${lang}`).classList.add('active');
        renderTabs();
        renderMenu(currentCat);
    }
    init();
</script>
</body>
</html>
