<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bar Povero Diavolo - Menu</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Montserrat:wght@300;400;500;600;700&family=Special+Elite&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #f5eee8;
            --surface: #fffaf6;
            --surface-2: #efe3df;

            --text: #2b181d;
            --text-soft: #6f565d;
            --text-muted: #9a858b;

            --bordeaux: #7b243e;
            --bordeaux-2: #8f2f4b;
            --vinaccia: #4a1026;
            --vinaccia-2: #5b1730;

            --accent: var(--bordeaux);
            --accent-2: var(--vinaccia);

            --line: rgba(74, 16, 38, 0.10);
            --line-soft: rgba(123, 36, 62, 0.08);

            --shadow-soft: 0 10px 30px rgba(74, 16, 38, 0.10);
            --shadow-nav: 0 18px 40px rgba(74, 16, 38, 0.30);

            --radius-lg: 28px;
            --radius-md: 18px;
            --radius-sm: 12px;

            --container-w: 720px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html { scroll-behavior: smooth; }

        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background:
                radial-gradient(circle at top right, rgba(123, 36, 62, 0.08), transparent 24%),
                linear-gradient(180deg, #fcf7f6 0%, var(--bg) 100%);
            color: var(--text);
            padding-bottom: 130px;
        }

        img {
            max-width: 100%;
            display: block;
        }

        /* HEADER */
        header {
            position: sticky;
            top: 0;
            z-index: 1200;
            background: rgba(247, 240, 238, 0.92);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--line);
        }

        .header-inner {
            max-width: var(--container-w);
            margin: 0 auto;
            padding: 18px 18px 14px;
        }

        .brand-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .logo-img {
            max-width: 88px;
            height: auto;
            margin-bottom: 10px;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.06));
        }

        .brand-kicker {
            font-size: 10px;
            letter-spacing: 2.2px;
            text-transform: uppercase;
            color: var(--bordeaux);
            margin-bottom: 6px;
            font-weight: 700;
        }

        .logo-text {
            font-family: 'Special Elite', cursive;
            font-size: 20px;
            color: var(--accent-2);
            letter-spacing: 1.8px;
            margin-bottom: 8px;
            text-transform: uppercase;
            line-height: 1.2;
        }

        .brand-subtitle {
            font-size: 12px;
            color: var(--text-soft);
            letter-spacing: 0.4px;
            margin-bottom: 14px;
        }

        .lang-switcher {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            padding: 5px;
            background: rgba(255,255,255,0.7);
            border: 1px solid rgba(74, 16, 38, 0.08);
            border-radius: 999px;
            margin: 0 auto;
        }

        .lang-btn {
            width: 42px;
            height: 42px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 21px;
            cursor: pointer;
            opacity: 0.45;
            transition: 0.25s ease;
            border-radius: 999px;
        }

        .lang-btn.active {
            opacity: 1;
            transform: scale(1.06);
            background: var(--surface);
            box-shadow: 0 6px 18px rgba(74, 16, 38, 0.10);
        }

        .allergen-link {
            display: inline-block;
            margin-top: 10px;
            color: var(--bordeaux);
            font-weight: 600;
            text-decoration: none;
            border-bottom: 1px solid rgba(123, 36, 62, 0.25);
            transition: 0.25s ease;
        }

        .allergen-link:hover {
            color: var(--vinaccia);
            border-bottom-color: var(--vinaccia);
        }

        /* HERO */
        .hero-wrap {
            max-width: var(--container-w);
            margin: 0 auto;
            padding: 18px 18px 0;
        }

        .hero-card {
            position: relative;
            overflow: hidden;
            background:
                linear-gradient(135deg, rgba(255,255,255,0.78), rgba(255,255,255,0.58)),
                linear-gradient(180deg, #fff9f7 0%, #f3e5e7 100%);
            border: 1px solid rgba(74, 16, 38, 0.08);
            border-radius: var(--radius-lg);
            padding: 22px 18px;
            box-shadow: var(--shadow-soft);
        }

        .hero-card::after {
            content: "";
            position: absolute;
            right: -34px;
            top: -34px;
            width: 132px;
            height: 132px;
            border-radius: 999px;
            background: radial-gradient(circle, rgba(123, 36, 62, 0.16), transparent 68%);
            pointer-events: none;
        }

        .hero-topline {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--bordeaux);
            margin-bottom: 8px;
        }

        .hero-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(32px, 7vw, 48px);
            line-height: 0.95;
            margin: 0 0 8px;
            color: var(--accent-2);
            text-transform: uppercase;
            font-weight: 700;
        }

        .hero-text {
            max-width: 560px;
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-soft);
        }

        /* CONTENT */
        .container {
            max-width: var(--container-w);
            margin: 0 auto;
            padding: 18px;
        }

        #loader {
            text-align: center;
            padding: 90px 0;
            color: var(--text-soft);
        }

        .spinner {
            width: 34px;
            height: 34px;
            border: 2px solid rgba(74, 16, 38, 0.12);
            border-top: 2px solid var(--accent);
            border-radius: 50%;
            animation: spin 0.85s linear infinite;
            margin: 0 auto 15px;
        }

        #loader-text {
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 700;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .section-card {
            background: rgba(255,255,255,0.48);
            border: 1px solid rgba(74, 16, 38, 0.08);
            border-radius: 26px;
            padding: 12px 16px 10px;
            box-shadow: var(--shadow-soft);
            margin-bottom: 18px;
        }

        .category-head {
            padding: 12px 2px 14px;
            margin-bottom: 6px;
            border-bottom: 1px solid var(--line);
            display: flex;
            align-items: flex-end;
            gap: 12px;
        }

        .cat-number {
            font-family: 'Cormorant Garamond', serif;
            font-size: 48px;
            line-height: 0.85;
            color: rgba(74, 16, 38, 0.16);
            min-width: 34px;
        }

        .cat-meta {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .cat-kicker {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--bordeaux);
        }

        .category-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 34px;
            color: var(--accent-2);
            margin: 0;
            font-weight: 700;
            text-transform: uppercase;
            line-height: 1;
        }

        .subcat-header {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--bordeaux);
            margin: 24px 0 10px;
            padding-bottom: 7px;
            border-bottom: 1px solid var(--line-soft);
        }

        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 18px;
            padding: 16px 0;
            border-bottom: 1px solid rgba(123, 36, 62, 0.06);
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .item-details {
            flex: 1;
            min-width: 0;
        }

        .item-name {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 5px;
            color: var(--text);
            line-height: 1.25;
        }

        .item-desc {
            font-size: 13px;
            color: var(--text-soft);
            font-weight: 400;
            line-height: 1.55;
        }

        .item-price {
            white-space: nowrap;
            font-family: 'Cormorant Garamond', serif;
            font-weight: 700;
            color: var(--accent);
            font-size: 24px;
            line-height: 1;
            padding-top: 1px;
        }

        .item-price small {
            font-size: 13px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            color: var(--text-soft);
            margin-right: 2px;
        }

        /* FLOATING NAV */
        nav {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(74, 16, 38, 0.96);
            border: 1px solid rgba(255,255,255,0.06);
            padding: 7px;
            border-radius: 999px;
            display: flex;
            gap: 6px;
            z-index: 2000;
            box-shadow: var(--shadow-nav);
            backdrop-filter: blur(14px);
        }

        nav button {
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.84);
            padding: 11px 18px;
            border-radius: 999px;
            font-family: 'Montserrat', sans-serif;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.25s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            min-height: 42px;
        }

        nav button.active {
            background: linear-gradient(180deg, var(--bordeaux-2), var(--vinaccia));
            color: #fff;
            box-shadow: 0 10px 18px rgba(0,0,0,0.18);
        }

        nav button:not(.active):hover {
            background: rgba(255,255,255,0.06);
            color: #fff;
        }

        .btn-icon {
            font-size: 15px;
            line-height: 1;
        }

        .btn-txt {
            letter-spacing: 0.4px;
        }

        .menu-note {
            margin-top: 16px;
            padding: 14px 16px;
            font-size: 12px;
            line-height: 1.6;
            color: var(--text-soft);
            text-align: center;
        }

        @media (max-width: 640px) {
            .header-inner,
            .hero-wrap,
            .container {
                padding-left: 14px;
                padding-right: 14px;
            }

            .hero-card {
                padding: 20px 16px;
                border-radius: 22px;
            }

            .section-card {
                border-radius: 22px;
                padding: 10px 14px 8px;
            }

            .category-title {
                font-size: 30px;
            }

            .cat-number {
                font-size: 42px;
            }

            .item-price {
                font-size: 22px;
            }

            nav {
                width: calc(100% - 24px);
                max-width: 360px;
                justify-content: center;
            }

            nav button {
                flex: 1;
                justify-content: center;
                padding: 11px 12px;
            }

            .btn-txt {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="header-inner">
        <div class="brand-box">
            <img src="logo.png" alt="Logo Bar Povero Diavolo" class="logo-img">
            <div class="brand-kicker">Caffetteria · Cucina · Aperitivi</div>
            <div class="logo-text">BAR POVERO DIAVOLO</div>

            <div class="lang-switcher">
                <span class="lang-btn active" onclick="changeLang('IT')" id="l-IT">🇮🇹</span>
                <span class="lang-btn" onclick="changeLang('EN')" id="l-EN">🇬🇧</span>
                <span class="lang-btn" onclick="changeLang('DE')" id="l-DE">🇩🇪</span>
            </div>
        </div>
    </div>
</header>

<section class="hero-wrap">
    <div class="hero-card">
        <div class="hero-topline" id="hero-topline">Menu digitale</div>
        <h1 class="hero-title" id="hero-title">Sapori & Bevande</h1>
        <div class="hero-text" id="hero-text">
            Scopri caffetteria, cocktail, vini, birre e cucina.
        </div>
        <a href="#menu-note" class="allergen-link" id="allergen-link">Consulta info allergeni</a>

    </div>
</section>

<div class="container">
    <div id="loader">
        <div class="spinner"></div>
        <div id="loader-text">CARICAMENTO</div>
    </div>
    <div id="menu-content"></div>
    <div class="menu-note" id="menu-note"></div>
</div>

<nav id="floating-nav">
    <button onclick="renderMacro('BEVANDE')" id="btn-BEVANDE">
        <span class="btn-icon">☕</span>
        <span class="btn-txt">BEVANDE</span>
    </button>
    <button onclick="renderMacro('CIBO')" id="btn-CIBO">
        <span class="btn-icon">🍝</span>
        <span class="btn-txt">CIBO</span>
    </button>
</nav>

<script>
    const GIDS = {
        'Caffetteria': '0',
        'Bevande': '1449858284',
        'Aperitivi': '2008785960',
        'Birre_e_Vino': '1805107999',
        'Cocktail': '2080510881',
        'Cucina': '1144090031'
    };

    const MACROS = {
        'BEVANDE': ['Caffetteria', 'Bevande', 'Aperitivi', 'Birre_e_Vino', 'Cocktail'],
        'CIBO': ['Cucina']
    };

    const subcatTranslations = {
        'Caffè': { IT: 'Caffè', EN: 'Coffee', DE: 'Kaffee' },
        'Tisane': { IT: 'Tisane', EN: 'Herbal Teas', DE: 'Kräutertees' },
        'Brioches / Torte': { IT: 'Brioches / Torte', EN: 'Pastries & Cakes', DE: 'Gebäck & Kuchen' },
        'Piatti Caldi': { IT: 'Piatti Caldi', EN: 'Hot Dishes', DE: 'Warme Speisen' },
        'Piatti Freddi': { IT: 'Piatti Freddi', EN: 'Cold Dishes', DE: 'Kalte Speisen' },
        'Birre alla spina': { IT: 'Birre alla spina', EN: 'Draft Beers', DE: 'Biere vom Fass' },
        'Birre in bottiglia': { IT: 'Birre in bottiglia', EN: 'Bottled Beers', DE: 'Flaschenbiere' },
        'Vino Bianco': { IT: 'Vino Bianco', EN: 'White Wine', DE: 'Weisswein' },
        'Vino Rosso': { IT: 'Vino Rosso', EN: 'Red Wine', DE: 'Rotwein' }
    };

    const uiTexts = {
        IT: {
            loader: "CARICAMENTO",
            BEVANDE: "BEVANDE",
            CIBO: "CIBO",
            brandSubtitle: "Un menu digitale elegante, caldo e facile da consultare.",
            heroTopline: "Menu digitale",
            heroTitle: "Sapori & Bevande",
            heroText: "Scopri caffetteria, cocktail, vini, birre e cucina in una consultazione chiara, raffinata e immediata.",
            section: "Sezione",
            note: "Per informazioni su ingredienti, allergeni o varianti disponibili, chiedi al personale.",
            allergenLink: "Consulta info allergeni",
        },
        EN: {
            loader: "LOADING",
            BEVANDE: "DRINKS",
            CIBO: "FOOD",
            brandSubtitle: "An elegant, warm and easy-to-browse digital menu.",
            heroTopline: "Digital menu",
            heroTitle: "Flavours & Drinks",
            heroText: "Discover coffee, cocktails, wine, beer and kitchen dishes in a clear, refined and immediate browsing experience.",
            section: "Section",
            note: "For information about ingredients, allergens or available variations, please ask the staff.",
            allergenLink: "View allergen info",
        },
        DE: {
            loader: "LADEN",
            BEVANDE: "GETRÄNKE",
            CIBO: "SPEISEN",
            brandSubtitle: "Ein elegantes, warmes und leicht nutzbares digitales Menü.",
            heroTopline: "Digitales Menü",
            heroTitle: "Aromen & Getränke",
            heroText: "Entdecken Sie Kaffee, Cocktails, Wein, Bier und Küche in einer klaren, raffinierten und angenehmen Menüansicht.",
            section: "Bereich",
            note: "Für Informationen zu Zutaten, Allergenen oder verfügbaren Varianten fragen Sie bitte das Personal.",
            allergenLink: "Allergeninformationen ansehen",
        }
    };

    const catNames = {
        'Caffetteria': { IT: 'Caffetteria', EN: 'Coffee Shop', DE: 'Kaffeehaus' },
        'Bevande': { IT: 'Bevande', EN: 'Beverages', DE: 'Getränke' },
        'Aperitivi': { IT: 'Aperitivi', EN: 'Aperitifs', DE: 'Aperitifs' },
        'Birre_e_Vino': { IT: 'Vini e Birre', EN: 'Beer & Wine', DE: 'Bier & Wein' },
        'Cocktail': { IT: 'Cocktail', EN: 'Cocktails', DE: 'Cocktails' },
        'Cucina': { IT: 'Cucina', EN: 'Kitchen', DE: 'Küche' }
    };

    let menuData = {};
    let currentLang = 'IT';
    let currentMacro = 'BEVANDE';

    function isValid(val) {
        return val && String(val).trim() !== '' && String(val).trim() !== '-';
    }

    function escapeHtml(str = '') {
        return String(str)
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#039;');
    }

    function setTextById(id, text) {
        const el = document.getElementById(id);
        if (el) el.innerText = text;
    }

    function setTextByQuery(selector, text) {
        const el = document.querySelector(selector);
        if (el) el.innerText = text;
    }

    function updateStaticTexts() {
    const t = uiTexts[currentLang];

    setTextById('loader-text', t.loader);
    setTextByQuery('#btn-BEVANDE .btn-txt', t.BEVANDE);
    setTextByQuery('#btn-CIBO .btn-txt', t.CIBO);
    setTextById('brand-subtitle', t.brandSubtitle);
    setTextById('hero-topline', t.heroTopline);
    setTextById('hero-title', t.heroTitle);
    setTextById('hero-text', t.heroText);
    setTextById('menu-note', t.note);
    setTextById('allergen-link', t.allergenLink);
}

    async function init() {
        updateStaticTexts();

        const baseUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSVBgF1mKBTxorPi079dl_2ISJ9RHoZDgM4HXEUfF_mcAKrfI0W0jPP3AdhVF5f0g7EB5xfzTgoEiLQ/pub?gid=';
        const urlSuffix = '&single=true&output=csv';

        for (const cat of Object.keys(GIDS)) {
            try {
                const response = await fetch(`${baseUrl}${GIDS[cat]}${urlSuffix}`);
                const csvString = await response.text();
                const results = Papa.parse(csvString, { header: true, skipEmptyLines: true });

                menuData[cat] = results.data.filter(row => {
                    const keys = Object.keys(row);
                    return row[keys[9]] && row[keys[9]].trim().toUpperCase() === 'SI';
                });
            } catch (e) {
                console.error(`Errore caricamento ${cat}:`, e);
                menuData[cat] = [];
            }
        }

        const loader = document.getElementById('loader');
        if (loader) loader.style.display = 'none';

        renderMacro('BEVANDE');
    }

    function renderMacro(macroKey) {
        currentMacro = macroKey;

        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        const activeBtn = document.getElementById(`btn-${macroKey}`);
        if (activeBtn) activeBtn.classList.add('active');

        updateStaticTexts();

        const content = document.getElementById('menu-content');
        if (!content) return;

        const t = uiTexts[currentLang];
        let html = '';
        let catIndex = 1;

        MACROS[macroKey].forEach(catKey => {
            const items = menuData[catKey] || [];
            if (items.length === 0) return;

            html += `
                <section class="section-card">
                    <div class="category-head">
                        <div class="cat-number">${String(catIndex).padStart(2, '0')}</div>
                        <div class="cat-meta">
                            <div class="cat-kicker">${t.section} ${catIndex}</div>
                            <h2 class="category-title">${escapeHtml(catNames[catKey][currentLang])}</h2>
                        </div>
                    </div>
            `;

            const grouped = items.reduce((acc, item) => {
                const keys = Object.keys(item);
                const rawSubcat = item[keys[0]];
                const sc = isValid(rawSubcat) && String(rawSubcat).trim().toLowerCase() !== 'menu'
                    ? String(rawSubcat).trim()
                    : "Main";

                if (!acc[sc]) acc[sc] = [];
                acc[sc].push(item);
                return acc;
            }, {});

            Object.keys(grouped).forEach(sc => {
                if (sc !== "Main") {
                    const scTrimmed = sc.trim();
                    const tSc = (subcatTranslations[scTrimmed] && subcatTranslations[scTrimmed][currentLang])
                        ? subcatTranslations[scTrimmed][currentLang]
                        : scTrimmed;

                    html += `<div class="subcat-header">${escapeHtml(tSc)}</div>`;
                }

                grouped[sc].forEach(item => {
                    const keys = Object.keys(item);

                    const name = item[keys[1 + (currentLang === 'EN' ? 1 : (currentLang === 'DE' ? 2 : 0))]] || item[keys[1]] || '';
                    const desc = item[keys[4 + (currentLang === 'EN' ? 1 : (currentLang === 'DE' ? 2 : 0))]] || item[keys[4]] || '';
                    const price = item[keys[7]] || '';

                    html += `
                        <div class="menu-item">
                            <div class="item-details">
                                <div class="item-name">${escapeHtml(name)}</div>
                                ${isValid(desc) ? `<div class="item-desc">${escapeHtml(desc)}</div>` : ''}
                            </div>
                            <div class="item-price"><small>€</small>${escapeHtml(price)}</div>
                        </div>
                    `;
                });
            });

            html += `</section>`;
            catIndex++;
        });

        content.innerHTML = html;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function changeLang(lang) {
        currentLang = lang;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        const activeLang = document.getElementById(`l-${lang}`);
        if (activeLang) activeLang.classList.add('active');
        renderMacro(currentMacro);
    }

    init();
</script>
</body>
</html>
