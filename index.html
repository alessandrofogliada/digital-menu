<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bar Povero Diavolo - Menu</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Montserrat:wght@300;400;700&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfaf7;
            --text: #2b1d1a;
            --accent: #a64d2d;
            --header-bg: #fdfaf7;
            --nav-bg: #2b1d1a; 
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding-bottom: 120px;
        }

        /* --- HEADER --- */
        header {
            text-align: center;
            padding: 30px 0 20px;
            background: var(--header-bg);
            border-bottom: 1px solid rgba(166, 77, 45, 0.1);
            position: sticky;
            top: 0;
            z-index: 1001;
        }

        .logo-img {
            max-width: 110px;
            height: auto;
            margin-bottom: 10px;
        }

        .logo-text {
            font-family: 'Special Elite', cursive;
            font-size: 20px;
            color: var(--accent);
            letter-spacing: 2px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .lang-switcher { display: flex; justify-content: center; gap: 25px; }
        .lang-btn { font-size: 22px; cursor: pointer; opacity: 0.3; transition: 0.3s; }
        .lang-btn.active { opacity: 1; transform: scale(1.2); }

        /* --- CONTENUTI --- */
        .container { padding: 15px; max-width: 600px; margin: auto; }

        .category-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 36px;
            color: var(--accent);
            text-align: center;
            margin: 40px 0 20px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .subcat-header {
            font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
            color: #aaa; margin: 35px 0 10px; border-bottom: 1px solid rgba(166, 77, 45, 0.08);
            padding-bottom: 5px;
        }

        .menu-item {
            display: flex; justify-content: space-between; align-items: flex-start;
            padding: 15px 0; border-bottom: 1px solid rgba(166, 77, 45, 0.05);
        }

        .item-details { flex: 1; padding-right: 20px; }
        .item-name { font-weight: 700; font-size: 16px; margin-bottom: 3px; }
        .item-desc { font-size: 13px; color: #777; font-weight: 300; line-height: 1.4; }
        .item-price { font-weight: 700; color: var(--accent); font-size: 16px; white-space: nowrap; }

        /* --- FLOATING NAVBAR --- */
        nav {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--nav-bg);
            padding: 6px;
            border-radius: 50px;
            display: flex;
            gap: 5px;
            z-index: 2000;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        nav button {
            background: none;
            border: none;
            color: #fff;
            padding: 10px 22px;
            border-radius: 40px;
            font-family: 'Montserrat', sans-serif;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        nav button.active { background: var(--accent); color: white; }

        #loader { text-align: center; padding: 100px 0; }
        .spinner { width: 30px; height: 30px; border: 2px solid #ddd; border-top: 2px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<header>
    <img src="logo.png" alt="Logo Bar Povero Diavolo" class="logo-img">
    <div class="logo-text">BAR POVERO DIAVOLO</div>
    <div class="lang-switcher">
        <span class="lang-btn active" onclick="changeLang('IT')" id="l-IT">🇮🇹</span>
        <span class="lang-btn" onclick="changeLang('EN')" id="l-EN">🇬🇧</span>
        <span class="lang-btn" onclick="changeLang('DE')" id="l-DE">🇩🇪</span>
    </div>
</header>

<div class="container">
    <div id="loader">
        <div class="spinner"></div>
        <div id="loader-text">CARICAMENTO</div>
    </div>
    <div id="menu-content"></div>
</div>

<nav id="floating-nav">
    <button onclick="renderMacro('BEVANDE')" id="btn-BEVANDE">
        <span>☕</span> <span class="btn-txt">BEVANDE</span>
    </button>
    <button onclick="renderMacro('CIBO')" id="btn-CIBO">
        <span>🍝</span> <span class="btn-txt">CIBO</span>
    </button>
</nav>

<script>
    const GIDS = {
        'Caffetteria': '0', 'Bevande': '1449858284', 'Aperitivi': '2008785960',
        'Birre_e_Vino': '1805107999', 'Cocktail': '2080510881', 'Cucina': '1144090031'
    };

    const MACROS = {
        'BEVANDE': ['Caffetteria', 'Bevande', 'Aperitivi', 'Birre_e_Vino', 'Cocktail'],
        'CIBO': ['Cucina']
    };

    // ELENCO COMPLETO DELLE TRADUZIONI SOTTOCATEGORIE
    const subcatTranslations = {
        'Caffè': { IT: 'Caffè', EN: 'Coffee', DE: 'Kaffee' },
        'Tisane': { IT: 'Tisane', EN: 'Herbal Teas', DE: 'Kräutertees' },
        'Brioches / Torte': { IT: 'Brioches / Torte', EN: 'Pastries & Cakes', DE: 'Gebäck & Kuchen' },
        'Piatti Caldi': { IT: 'Piatti Caldi', EN: 'Hot Dishes', DE: 'Warme Speisen' },
        'Piatti freddi': { IT: 'Piatti freddi', EN: 'Cold Dishes', DE: 'Kalte Speisen' },
        'Birre alla spina': { IT: 'Birre alla spina', EN: 'Draft Beers', DE: 'Biere vom Fass' },
        'Birre in bottiglia': { IT: 'Birre in bottiglia', EN: 'Bottled Beers', DE: 'Flaschenbiere' },
        'Vino Bianco': { IT: 'Vino Bianco', EN: 'White Wine', DE: 'Weisswein' },
        'Vino Rosso': { IT: 'Vino Rosso', EN: 'Red Wine', DE: 'Rotwein' }
    };

    const uiTexts = {
        'IT': { loader: "CARICAMENTO", BEVANDE: "BEVANDE", CIBO: "CIBO" },
        'EN': { loader: "LOADING", BEVANDE: "DRINKS", CIBO: "FOOD" },
        'DE': { loader: "LADEN", BEVANDE: "GETRÄNKE", CIBO: "SPEISEN" }
    };

    const catNames = {
        'Caffetteria': { IT: 'Caffetteria', EN: 'Coffee Shop', DE: 'Kaffeehaus' },
        'Bevande': { IT: 'Bevande', EN: 'Beverages', DE: 'Getränke' },
        'Aperitivi': { IT: 'Aperitivi', EN: 'Appetizers', DE: 'Aperitifs' },
        'Birre_e_Vino': { IT: 'Vini e Birre', EN: 'Beer & Wine', DE: 'Bier & Wein' },
        'Cocktail': { IT: 'Cocktail', EN: 'Cocktails', DE: 'Cocktails' },
        'Cucina': { IT: 'Cucina', EN: 'Kitchen', DE: 'Küche' }
    };
    
    let menuData = {};
    let currentLang = 'IT';
    let currentMacro = 'BEVANDE';

    function isValid(val) { return val && val.trim() !== '' && val.trim() !== '-'; }

    async function init() {
        document.getElementById('loader-text').innerText = uiTexts[currentLang].loader;
        const baseUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSVBgF1mKBTxorPi079dl_2ISJ9RHoZDgM4HXEUfF_mcAKrfI0W0jPP3AdhVF5f0g7EB5xfzTgoEiLQ/pub?gid=';
        const urlSuffix = '&single=true&output=csv';

        for (let cat of Object.keys(GIDS)) {
            try {
                const response = await fetch(`${baseUrl}${GIDS[cat]}${urlSuffix}`);
                const csvString = await response.text();
                const results = Papa.parse(csvString, { header: true, skipEmptyLines: true });
                menuData[cat] = results.data.filter(row => {
                    const keys = Object.keys(row);
                    return row[keys[9]] && row[keys[9]].trim().toUpperCase() === 'SI';
                });
            } catch (e) { console.error(e); }
        }
        document.getElementById('loader').style.display = 'none';
        renderMacro('BEVANDE');
    }

    function renderMacro(macroKey) {
        currentMacro = macroKey;
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${macroKey}`).classList.add('active');
        
        document.querySelector('#btn-BEVANDE .btn-txt').innerText = uiTexts[currentLang].BEVANDE;
        document.querySelector('#btn-CIBO .btn-txt').innerText = uiTexts[currentLang].CIBO;

        const content = document.getElementById('menu-content');
        let html = '';

        MACROS[macroKey].forEach(catKey => {
            const items = menuData[catKey] || [];
            if(items.length === 0) return;

            html += `<h2 class="category-title">${catNames[catKey][currentLang]}</h2>`;

            const grouped = items.reduce((acc, item) => {
                const keys = Object.keys(item);
                const sc = isValid(item[keys[0]]) && item[keys[0]].toLowerCase() !== 'menu' ? item[keys[0]] : "Main"; 
                if (!acc[sc]) acc[sc] = [];
                acc[sc].push(item);
                return acc;
            }, {});

            Object.keys(grouped).forEach(sc => {
                if (sc !== "Main") { 
                    // Normalizzazione per evitare problemi con spazi o maiuscole
                    const scTrimmed = sc.trim();
                    let tSc = (subcatTranslations[scTrimmed] && subcatTranslations[scTrimmed][currentLang]) 
                              ? subcatTranslations[scTrimmed][currentLang] 
                              : scTrimmed;
                    html += `<div class="subcat-header">${tSc}</div>`; 
                }
                grouped[sc].forEach(item => {
                    const keys = Object.keys(item);
                    const name = item[keys[1 + (currentLang === 'EN' ? 1 : (currentLang === 'DE' ? 2 : 0))]] || item[keys[1]];
                    const desc = item[keys[4 + (currentLang === 'EN' ? 1 : (currentLang === 'DE' ? 2 : 0))]] || item[keys[4]];
                    const price = item[keys[7]];
                    html += `
                        <div class="menu-item">
                            <div class="item-details">
                                <div class="item-name">${name}</div>
                                ${isValid(desc) ? `<div class="item-desc">${desc}</div>` : ''}
                            </div>
                            <div class="item-price">€ ${price}</div>
                        </div>`;
                });
            });
        });
        content.innerHTML = html;
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function changeLang(lang) {
        currentLang = lang;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`l-${lang}`).classList.add('active');
        renderMacro(currentMacro);
    }

    init();
</script>
</body>
</html>
